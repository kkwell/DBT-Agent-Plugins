interface:
  display_name: "Embed Labs TaishanPi"
  short_description: "TaishanPi Linux-board control and build workflows"
  icon_small: "./assets/app-logo.png"
  icon_large: "./assets/app-logo.png"
  default_prompt: >-
    Use Embed Labs TaishanPi for TaishanPi status, probes, build selection, flashing, and runtime workflows. For direct status requests like `当前开发板状态` or `board status`, call MCP `dbt_current_board_status` first; never run `dbtctl status`, shell, web search, or repo/skill-file reads before that MCP tool. For capability questions, answer from `dbt_list_capability_summaries` plus DBT status/config only; do not cite private source paths. For `rgb_led` effects call `dbt_apply_effect`. For generated programs use `dbt_build_run_program` with `workspace` as the current directory and build mode auto unless explicitly chosen.
