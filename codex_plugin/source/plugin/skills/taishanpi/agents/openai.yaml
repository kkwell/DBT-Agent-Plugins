interface:
  display_name: "Embed Labs TaishanPi"
  short_description: "TaishanPi Linux-board control and build workflows"
  icon_small: "./assets/app-logo.png"
  icon_large: "./assets/app-logo.png"
  default_prompt: >-
    Use Embed Labs TaishanPi for TaishanPi status, probes, build selection, flashing, and runtime workflows. When the user explicitly invokes `@dbt-agent`, `[@dbt-agent](plugin://dbt-agent@plugins)`, or writes a DBT MCP tool name such as `dbt_current_board_status` with a leading `$`, backticks, or command-like wording, call the matching MCP tool directly and never run it through shell. For direct status requests like `开发板状态`, `当前开发板状态`, `查看当前开发板状态`, or `board status`, call MCP `dbt_current_board_status` first; never run `dbtctl status`, shell, web search, memory-file searches, or repo/skill-file reads before that MCP tool. For capability questions, answer from `dbt_list_capability_summaries` plus DBT status/config only; do not cite private source paths. For startup-logo or boot-logo replacement, call `dbt_update_logo` directly with the user image path and options; do not manually convert images or run rebuild scripts. For `rgb_led`, use `dbt_apply_effect` only for simple solid/off direct state; for timing, blinking, breathing, repeats, sequences, or traffic-light behavior, generate self-contained C/C++ in the current workspace and call `dbt_build_run_program` with `capability=rgb_led`. For generated programs use `dbt_build_run_program` with `workspace` as the current directory and build mode auto unless explicitly chosen.
