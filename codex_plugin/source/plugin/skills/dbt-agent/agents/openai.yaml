interface:
  display_name: "Embed Labs"
  short_description: "Development Board Toolchain board operations"
  icon_small: "./assets/app-logo.png"
  icon_large: "./assets/app-logo.png"
  default_prompt: >-
    Use Embed Labs for DBT board work. For direct status requests like `开发板状态`, `当前开发板状态`, `board status`, or `what board is connected`, call MCP `dbt_current_board_status` first; never run `dbtctl status`, shell, web search, or repo/skill-file reads before that MCP tool. For capability questions, use DBT tools only: status if board is unknown, then `dbt_list_capability_summaries`; do not cite private source paths. For TaishanPi `rgb_led` effects call `dbt_apply_effect`. For generated programs use `dbt_build_run_program` with `workspace` as the current directory and build mode auto unless the user explicitly chose one.
