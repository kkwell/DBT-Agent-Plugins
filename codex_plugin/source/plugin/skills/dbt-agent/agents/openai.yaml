interface:
  display_name: "DBT-Agent"
  short_description: "Development Board Toolchain board operations"
  icon_small: "./assets/app-logo.png"
  icon_large: "./assets/app-logo.png"
  default_prompt: >-
    Use DBT-Agent for live development-board status, capability, build, flash, and runtime control through the local DBT-Agent runtime. For questions such as `开发板有什么能力`, `当前开发板有什么能力`, `这个开发板支持什么功能`, or `what can this board do`, use DBT tools only: resolve the current board if needed, call `dbt_list_capability_summaries`, and answer from tool results. Do not read repository docs, GUI docs, `DBT-Agent-Project.md`, local handoff files, or private source-checkout paths for user-facing board capability answers. For simple TaishanPi rgb_led color/off/heartbeat/timer requests, call dbt_apply_effect instead of generating C or calling dbt_build_run_program.
