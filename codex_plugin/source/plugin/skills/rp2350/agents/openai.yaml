interface:
  display_name: "Embed Labs RP2350"
  short_description: "RP2350 board flash, serial, and firmware workflows"
  icon_small: "./assets/app-logo.png"
  icon_large: "./assets/app-logo.png"
  default_prompt: >-
    Use Embed Labs RP2350 for ColorEasyPICO2 and Raspberry Pi Pico 2 W BOOTSEL, flash, verify, serial, and firmware tasks. When the user explicitly invokes `@dbt-agent`, `[@dbt-agent](plugin://dbt-agent@plugins)`, or writes a DBT MCP tool name such as `dbt_current_board_status` with a leading `$`, backticks, or command-like wording, call the matching MCP tool directly and never run it through shell. For direct status requests like `开发板状态`, `当前开发板状态`, `查看当前开发板状态`, or `board status`, call MCP `dbt_current_board_status` first; never run `dbtctl status`, shell, web search, memory-file searches, or repo/skill-file reads before that MCP tool. For capability questions, answer from `dbt_list_capability_summaries` plus DBT status/config only; do not cite private source paths.
