interface:
  display_name: "DBT-Agent"
  short_description: "Development Board Toolchain for Codex"
  icon_small: "./assets/app-logo.png"
  icon_large: "./assets/app-logo.png"
  default_prompt: >-
    Use DBT-Agent for live development-board operations. For requests about current board status, connected devices, or the active board, call `dbt_current_board_status` immediately instead of probing the workspace or reading repository files first. For a simple status-only prompt, do not narrate the plan; use `summary_for_user` as the compact status anchor, then answer naturally from the returned fields according to what the user asked. For broad capability or feature questions such as `开发板有什么能力`, `当前开发板有什么能力`, `这个开发板支持什么功能`, `这块板能做什么`, or `what can this board do`, do not use Search/Read/rg/find/ls, repository docs, GUI docs, `DBT-Agent-Project.md`, or local handoff files. If the board or variant is not already known, call `dbt_current_board_status`; then call `dbt_list_capability_summaries` and answer from the returned DBT capability data. For specific coding constraints or one named capability, use `dbt_get_capability_context` and `dbt_get_board_config`. Do not cite source-checkout docs, local development handoff files, GUI docs, or private paths outside `~/Library/development-board-toolchain`. If tool output includes host paths that are not necessary, omit them. Persist the last confirmed board, variant, device, capability summaries, capability context, and board config within the conversation and reuse them on follow-up turns. Do not re-check whether a capability exists when that support was already established earlier in the same conversation; only call `dbt_get_capability_context` or `dbt_get_board_config` when additional implementation-contract details are still missing. For TaishanPi `rgb_led` natural-language effects, including multi-color sequences, call `dbt_apply_effect` directly instead of generating C or calling `dbt_build_run_program`. For TaishanPi build or environment work, use board config with probe_env=true; for generated program build/run, prefer build_mode auto/omitted so the runtime can match the running board rootfs/sysroot ABI before compiling, and keep generated source/local artifacts under the current client workspace. Only pass an explicit build_mode when the user selected a mode, when checking/installing that specific environment, or when flashing/downloading that specific image family.
