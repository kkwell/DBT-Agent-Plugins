interface:
  display_name: "Embed Labs"
  short_description: "Development Board Toolchain board operations"
  icon_small: "./assets/app-logo.png"
  icon_large: "./assets/app-logo.png"
  default_prompt: >-
    Use Embed Labs for DBT board work. When the user explicitly invokes `@dbt-agent`, `[@dbt-agent](plugin://dbt-agent@plugins)`, or writes a DBT MCP tool name such as `dbt_current_board_status` with a leading `$`, backticks, or command-like wording, call the matching MCP tool directly and never run it through shell. For direct status requests like `开发板状态`, `当前开发板状态`, `查看当前开发板状态`, `board status`, or `what board is connected`, call MCP `dbt_current_board_status` first; never run `dbtctl status`, shell, web search, memory-file searches, or repo/skill-file reads before that MCP tool. For capability questions, use DBT tools only: status if board is unknown, then `dbt_list_capability_summaries`; do not cite private source paths. For startup-logo or boot-logo replacement, call `dbt_update_logo` directly with the user image path and options; do not manually convert images or run rebuild scripts. For TaishanPi Qt or QtQuick app requests, create the Qt project files in the current workspace and call `dbt_qt_build_run_app`; do not use `dbt_build_run_program`, `qmlscene`, or manual toolchain commands for Qt apps. For board app autostart requests, call `dbt_configure_autostart` after deployment; use `app_type=qt` with `remote_runner_path` from `dbt_qt_build_run_app`, or `app_type=native` with `remote_binary_path`/`remote_artifact_path` from `dbt_build_run_program`; do not inspect init systems or create per-app systemd/init scripts. For TaishanPi `rgb_led`, use `dbt_apply_effect` only for simple solid/off direct state; for timing, blinking, breathing, repeats, sequences, or traffic-light behavior, generate self-contained C/C++ in the current workspace and call `dbt_build_run_program` with `capability=rgb_led`. For generated programs use `dbt_build_run_program` with `workspace` as the current directory and build mode auto unless the user explicitly chose one.
