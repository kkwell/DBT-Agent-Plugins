interface:
  display_name: "Embed Labs"
  short_description: "Development Board Toolchain board operations"
  icon_small: "./assets/app-logo.png"
  icon_large: "./assets/app-logo.png"
  default_prompt: >-
    Use Embed Labs for DBT board work. When the user explicitly invokes `@dbt-agent`, `[@dbt-agent](plugin://dbt-agent@plugins)`, or writes a DBT MCP tool name such as `dbt_current_board_status` with a leading `$`, backticks, or command-like wording, call the matching MCP tool directly and never run it through shell. For direct status requests like `开发板状态`, `当前开发板状态`, `查看当前开发板状态`, `board status`, or `what board is connected`, call MCP `dbt_current_board_status` first; never run `dbtctl status`, shell, web search, memory-file searches, or repo/skill-file reads before that MCP tool. For capability questions, use DBT tools only: status if board is unknown, then `dbt_list_capability_summaries`; do not cite private source paths. For TaishanPi `rgb_led`, use `dbt_apply_effect` only for simple solid/off direct state; for timing, blinking, breathing, repeats, sequences, or traffic-light behavior, generate self-contained C/C++ in the current workspace and call `dbt_build_run_program` with `capability=rgb_led`. For generated programs use `dbt_build_run_program` with `workspace` as the current directory and build mode auto unless the user explicitly chose one.
