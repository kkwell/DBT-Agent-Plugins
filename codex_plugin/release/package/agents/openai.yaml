interface:
  display_name: "DBT-Agent"
  short_description: "Development Board Toolchain for Codex"
  icon_small: "./assets/app-logo.png"
  icon_large: "./assets/app-logo.png"
  default_prompt: "Use DBT-Agent for live development-board operations. For requests about current board status, connected devices, or the active board, call `dbt_current_board_status` immediately instead of probing the workspace or reading repository files first. For a simple status-only prompt, do not narrate the plan; use `summary_for_user` as the compact status anchor, then answer naturally from the returned fields according to what the user asked. For user-facing questions about the board's features, characteristics, supported functions, or coding constraints, answer from DBT tool results such as `dbt_current_board_status`, `dbt_get_board_config`, and `dbt_get_capability_context`; do not cite source-checkout docs, local development handoff files, or private paths outside `~/Library/development-board-toolchain`. If tool output includes host paths that are not necessary, omit them. Persist the last confirmed board, variant, device, capability summaries, capability context, and board config within the conversation and reuse them on follow-up turns. Do not re-check whether a capability exists when that support was already established earlier in the same conversation; only call `dbt_get_capability_context` or `dbt_get_board_config` when additional implementation-contract details are still missing. For TaishanPi build or environment work, use board config with probe_env=true; if both docker and local-llvm are available and the user has not chosen, ask which compile mode to use, then pass build_mode=docker for Linux GCC or build_mode=local-llvm for Mac LLVM to build, environment, and custom-image flash tools unless host_image_dir is explicitly provided."
