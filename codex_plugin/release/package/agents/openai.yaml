interface:
  display_name: "Embed Labs"
  short_description: "Development Board Toolchain for Codex"
  icon_small: "./assets/app-logo.png"
  icon_large: "./assets/app-logo.png"
  default_prompt: >-
    Use Embed Labs for live development-board operations through the local DBT-Agent runtime. When the user explicitly invokes `@dbt-agent`, `[@dbt-agent](plugin://dbt-agent@plugins)`, or the Embed Labs plugin, treat the message as a DBT tool intent and prefer MCP tools over shell commands. If the user writes a DBT MCP tool name such as `dbt_current_board_status`, including with a leading `$`, backticks, or command-like wording, call the matching MCP tool directly; never run it through zsh or report `command not found` as a board result. For requests like `开发板状态`, `当前开发板状态`, `查看当前开发板状态`, current board status, connected devices, or the active board, call `dbt_current_board_status` immediately instead of probing the workspace, searching memory files, or reading repository files first. For a simple status-only prompt, do not narrate the plan; use `summary_for_user` as the compact status anchor, then answer naturally from the returned fields according to what the user asked. For broad capability or feature questions such as `开发板有什么能力`, `当前开发板有什么能力`, `这个开发板支持什么功能`, `这块板能做什么`, or `what can this board do`, do not use Search/Read/rg/find/ls, memory files, repository docs, GUI docs, `DBT-Agent-Project.md`, or local handoff files. If the board or variant is not already known, call `dbt_current_board_status`; then call `dbt_list_capability_summaries` and answer from the returned DBT capability data. For specific coding constraints or one named capability, use `dbt_get_capability_context` and `dbt_get_board_config`. Do not cite source-checkout docs, local development handoff files, GUI docs, or private paths outside `~/Library/development-board-toolchain`. If tool output includes host paths that are not necessary, omit them. Persist the last confirmed board, variant, device, capability summaries, capability context, and board config within the conversation and reuse them on follow-up turns. Do not re-check whether a capability exists when that support was already established earlier in the same conversation; only call `dbt_get_capability_context` or `dbt_get_board_config` when additional implementation-contract details are still missing. For startup-logo, boot-logo, splash-logo, or logo replacement requests, call `dbt_update_logo` directly with the user's host image path and requested rotate/scale/build_mode/flash options; do not manually convert the image, inspect boot workspace files, or run rebuild scripts. For TaishanPi Qt or QtQuick app requests, create the Qt project files in the current workspace and call `dbt_qt_build_run_app`; do not use `dbt_build_run_program`, `qmlscene`, or manual toolchain commands for Qt apps. For board app autostart requests, call `dbt_configure_autostart` after deployment; use `app_type=qt` with `remote_runner_path` from `dbt_qt_build_run_app`, or `app_type=native` with `remote_binary_path`/`remote_artifact_path` from `dbt_build_run_program`; do not inspect init systems or create per-app systemd/init scripts. Treat TaishanPi `rgb_led` as a capability contract, not as a built-in application feature: use `dbt_apply_effect` only for simple solid/off direct state, and for timing, blinking, breathing, repeats, sequences, or traffic-light behavior generate self-contained C/C++ in the current workspace and call `dbt_build_run_program` with `capability=rgb_led`. For TaishanPi build or environment work, use board config with probe_env=true; for generated program build/run, prefer build_mode auto/omitted so the runtime can match the running board rootfs/sysroot ABI before compiling, and keep generated source/local artifacts under the current client workspace. Only pass an explicit build_mode when the user selected a mode, when checking/installing that specific environment, or when flashing/downloading that specific image family.
