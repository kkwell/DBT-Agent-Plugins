<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 150" role="img" aria-labelledby="title">
  <title id="title">Embed Labs wordmark</title>
  <style>
    .word { fill: #263238; }
    .accent { fill: #F2A900; }
    @media (prefers-color-scheme: dark) {
      .word { fill: #F8FAFC; }
      .accent { fill: #FFC33D; }
    }
  </style>
  <text x="40" y="100"
        font-family="Rajdhani, Exo 2, Orbitron, Arial, sans-serif"
        font-size="82"
        font-weight="600"
        letter-spacing="2">
    <tspan class="word">Embed</tspan>
    <tspan class="accent" dx="18">Labs</tspan>
  </text>
</svg>
